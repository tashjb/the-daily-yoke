<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Training Tracker — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #181818; --surface2: #222;
      --gold: #f0c040; --gold-bg: #1e1800; --gold-dim: #7a6010;
      --blue: #4a9eff; --blue-bg: #0a1a2e;
      --green: #3dba6a; --green-bg: #0a1e12;
      --red: #f06060; --red-bg: #2a0a0a;
      --text: #f0f0f0; --muted: #777; --border: #2e2e2e; --radius: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 16px; -webkit-font-smoothing: antialiased;
    }

    .logo { font-size: 36px; margin-bottom: 8px; }
    .tagline { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    .card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }

    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 14px; text-align: center;
      font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    .form-panel { display: none; padding: 24px; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 16px;
      padding: 11px 14px; -webkit-appearance: none;
    }
    .field input:focus { outline: none; border-color: var(--blue); background: var(--blue-bg); }

    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      -webkit-tap-highlight-color: transparent; margin-top: 4px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn.primary { background: var(--gold); color: #000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: 10px; padding: 11px 14px;
      font-size: 13px; color: var(--red); margin-bottom: 16px; display: none;
    }
    .success-box {
      background: var(--green-bg); border: 1px solid var(--green);
      border-radius: 10px; padding: 11px 14px;
      font-size: 13px; color: var(--green); margin-bottom: 16px; display: none;
    }

    .divider { text-align: center; font-size: 12px; color: var(--muted); margin: 16px 0; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="logo">💪 The Daily Yoke</div>
<div class="tagline">Training Tracker</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Log in</div>
    <div class="tab" onclick="switchTab('signup')">Sign up</div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="error-box" id="login-error"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn primary" id="login-btn" onclick="doLogin()">Log in</button>
  </div>

  <!-- SIGNUP -->
  <div class="form-panel" id="panel-signup">
    <div class="error-box" id="signup-error"></div>
    <div class="success-box" id="signup-success"></div>
    <div class="field">
      <label>Your name</label>
      <input type="text" id="signup-name" placeholder="e.g. Alex" autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <button class="btn primary" id="signup-btn" onclick="doSignup()">Create account</button>
    <div class="divider">You'll set up your workout on the next screen</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── CONFIG — replace with your Supabase project values ────
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';
// ──────────────────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, redirect
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) redirect(session.user);
});

function switchTab(tab) {
  ['login', 'signup'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
    document.querySelectorAll('.tab')[t === 'login' ? 0 : 1].classList.toggle('active', t === tab);
  });
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-error');

  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log in';
    return;
  }
  redirect(data.user);
}

async function doSignup() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;
  const btn   = document.getElementById('signup-btn');
  const err   = document.getElementById('signup-error');
  const suc   = document.getElementById('signup-success');

  err.style.display = 'none';
  suc.style.display = 'none';

  if (!name) { err.textContent = 'Please enter your name.'; err.style.display = 'block'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { name } }
  });

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create account';
    return;
  }

  // Supabase may require email confirmation depending on your settings.
  // If confirmations are OFF, session will exist immediately.
  if (data.session) {
    redirect(data.user);
  } else {
    suc.textContent = 'Check your email to confirm your account, then log in.';
    suc.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
}

async function redirect(user) {
  // Check if user already has a saved program
  const { data } = await sb
    .from('user_programs')
    .select('id')
    .eq('user_id', user.id)
    .maybeSingle();

  if (data) {
    window.location.href = 'app.html';
  } else {
    window.location.href = 'setup.html';
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.form-panel.active');
  if (active.id === 'panel-login') doLogin();
  else doSignup();
});
</script>
</body>
</html>
